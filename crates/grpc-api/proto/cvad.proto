syntax = "proto3";

package cvad.v1;

service Cvad {
    rpc GetExpireDate(GetExpireDateRequest) returns (GetExpireDateResponse);
}

message GetExpireDateRequest {
    string cvad_url = 1;
    string site_name = 2;
}

message GetExpireDateResponse {
    // RFC 3339 format when found (e.g., "2025-10-29T12:34:54+09:00")
    string expire_rfc3339 = 1;
    bool found = 2;
    // Option error description if something went wrong
    string error = 3;
}
