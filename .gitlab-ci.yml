---
stages:
  - lint
  - test
  - build
  - deploy

variables:
  CI_REGISTRY_IMAGE: registry-gitlab.yuiop.org/$CI_PROJECT_PATH
  CARGO_HOME: $CI_PROJECT_DIR/.cargo

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cargo/bin
    - .cargo/registry
    - .cargo/git
    - target/

lint:yaml:
  stage: lint
  image: alpine:3.20
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
  before_script:
    - apk add --no-cache yamllint
  script:
    - yamllint .gitlab-ci.yml
    - yamllint k8s/

lint:dockerfile:
  stage: lint
  image: alpine:3.20
  rules:
    - if: $CI_COMMIT_BRANCH
      changes:
        - Dockerfile
        - dockerbuild/**
        - .gitlab-ci.yml
    - if: $CI_COMMIT_TAG
  before_script:
    - apk add --no-cache curl
    - |
      HADOLINT_VERSION="v2.12.0"
      curl -sSL -o /usr/local/bin/hadolint \
        "https://github.com/hadolint/hadolint/releases/download/${HADOLINT_VERSION}/hadolint-Linux-x86_64"
      chmod +x /usr/local/bin/hadolint
  script:
    - |
      if [ -f Dockerfile ]; then
        hadolint --failure-threshold error Dockerfile
      else
        echo "Skip: Dockerfile not found"
      fi
    - |
      if [ -f dockerbuild/Dockerfile ]; then
        hadolint --failure-threshold error dockerbuild/Dockerfile
      else
        echo "Skip: dockerbuild/Dockerfile not found"
      fi

lint:rust:
  stage: lint
  image: rust:latest
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
  before_script:
    - |
      apt-get update && \
      apt-get install -y --no-install-recommends protobuf-compiler
    - rustup component add rustfmt clippy
  script:
    - cargo fmt --all
    - cargo clippy --workspace --all-targets

test:rust:
  stage: test
  image: rust:latest
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
  before_script:
    - |
      apt-get update && \
      apt-get install -y --no-install-recommends protobuf-compiler
  script:
    - cargo test --workspace --verbose

build:image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  before_script:
    - mkdir -p /kaniko/.docker
    - |
      printf '{"auths":{"%s":{"username":"%s","password":"%s"}}}' \
        "$CI_REGISTRY" "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" \
        > /kaniko/.docker/config.json
  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        IMAGE_TAG="$CI_COMMIT_TAG"
      else
        IMAGE_TAG="$CI_COMMIT_SHORT_SHA"
      fi
      echo "IMAGE_TAG=$IMAGE_TAG" > build.env
      cat build.env
    - |
      . ./build.env
      /kaniko/executor \
        --context "$CI_PROJECT_DIR" \
        --dockerfile "$CI_PROJECT_DIR/Dockerfile" \
        --destination "$CI_REGISTRY_IMAGE:$IMAGE_TAG" \
        --destination "$CI_REGISTRY_IMAGE:latest" \
        --build-arg VERSION="$IMAGE_TAG" \
        --build-arg BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
        --build-arg VCS_REF="$CI_COMMIT_SHA"
    - |
      . ./build.env
      /kaniko/executor \
        --context "$CI_PROJECT_DIR/dockerbuild" \
        --dockerfile "$CI_PROJECT_DIR/dockerbuild/Dockerfile" \
        --destination "$CI_REGISTRY_IMAGE/dev:$IMAGE_TAG" \
        --destination "$CI_REGISTRY_IMAGE/dev:latest" \
        --build-arg VERSION="$IMAGE_TAG" \
        --build-arg BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
        --build-arg VCS_REF="$CI_COMMIT_SHA"
  artifacts:
    reports:
      dotenv: build.env
    expire_in: 1 day

deploy:gitops:
  stage: deploy
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  needs:
    - job: build:image
      artifacts: true
  before_script:
    - apk add --no-cache git
  script:
    - . ./build.env
    - |
      git clone https://${GITOPS_TOKEN}@${GITOPS_REPO#https://} gitops-repo
      cd gitops-repo
      sed -i \
        "s|image: .*|image: $CI_REGISTRY_IMAGE:$IMAGE_TAG|" \
        ./apps/homepage/overlays/prod/image-tag.yaml
      git config user.email "$GITOPS_USER_EMAIL"
      git config user.name "$GITOPS_USER_NAME"
      git add -A
      if git diff --cached --quiet; then
        echo "No changes to commit"
      else
        git commit -m \
          "Update homepage image to $IMAGE_TAG (commit: $CI_COMMIT_SHORT_SHA)"
        git push origin main
      fi
  environment:
    name: production
    action: start
    deployment_tier: production
