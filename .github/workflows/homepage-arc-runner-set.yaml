name: homepage Actions Runner Set
on:
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]

env:
  HARBOR_REGISTRY: harbor.yuiop.org
  IMAGE_NAME: homepage
  HARBOR_PROJECT: homepage
  HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
  HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}

jobs:
  build:
    # You need to use the INSTALLATION_NAME from the previous step
    runs-on: homepage-arc-runner-set

    permissions:
      contents: read
      packages: write

    steps:
      - name: 1. Checkout 
        uses: actions/checkout@v5

      - name: 1.5. Truest Harbor certificate
        run: |
          # Get the certificate from Harbor
          echo -n | openssl s_client -connect harbor.yuiop.org:443 -servername harbor.yuiop.org 2>/dev/null | \
            sed -ne '/-BEGIN CERTIFICATE-/,/-END CERTIFICATE-/p' | \
            sudo tee /usr/local/share/ca-certificates/harbor.crt

          # Update the CA certificates
          sudo update-ca-certificates

          # Also add to Docker daemon config
          sudo mkdir -p /etc/docker/certs.d/harbor.yuiop.org
          sudo cp /usr/local/share/ca-certificates/harbor.crt /etc/docker/certs.d/harbor.yuiop.org/ca.crt

      # 1. BuildKit (Buildx) 설정 - K8s 드라이버 사용 
      - name: 2. Set up Docker Buildx 
        uses: docker/setup-buildx-action@v3
        with: 
          driver: kubernetes
          buildkitd-config-inline: |
            [registry."harbor.yuiop.org"]
              ca = ["/etc/docker/certs.d/harbor.yuiop.org/ca.crt"]
      
      # 2. Harbor 레지스트리 로그인 
      - name: Log in to the Harbor registry 
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ env.HARBOR_USERNAME }}
          password: ${{ env.HARBOR_PASSWORD }}

      # 3. 이미지 빌드 및 푸시 (BuildKit 기반)
      - name: 3. Build and push buildctl
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # 캐시 활용?
          cache-from: type=registry,ref=${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:buildcache,mode=max